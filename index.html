<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<title>Rock Paper Scissors</title>
	</head>

	<body>
		<header>Rock Paper Scissors</header>
		<h1>
			Play Rock Paper Scissors against the computer! The first player to score
			five points wins.
		</h1>
		<div id="resultsDiv">
			<h2>The results of your game will be displayed here.</h2>
		</div>
		<button id="rockBtn">
			<img src="rock.png">
		</button>
		<button id="paperBtn"><img src="paper.png"></button>
		<button id="scissorsBtn"><img src="scissors.png"></button>
		<button id="restartBtn">Restart</button>
	</body>
	<script src="script.js"></script>
</html>
